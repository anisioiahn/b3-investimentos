# App de Investimentos B3 — Cotações Reais

App completo de acompanhamento de ações da B3, organizado pelos **10 setores
oficiais da bolsa**, com cotações reais via [brapi.dev](https://brapi.dev),
alertas de preço-alvo e atualização automática.

Este projeto foi desenhado para rodar com **Claude Code**, que tem acesso
real à internet (diferente do widget no chat do Claude.ai, que roda num
iframe sem permissão de rede).

## 1. Pré-requisitos

- Python 3.9 ou superior instalado
- Uma conta gratuita em https://brapi.dev (necessária para tickers além das
  4 ações de teste gratuitas: PETR4, MGLU3, VALE3, ITUB4)

## 2. Instalação

Abra o terminal na pasta do projeto e rode:

```bash
pip install flask requests
```

## 3. Configurar seu token da brapi.dev

1. Crie uma conta gratuita em https://brapi.dev
2. Vá em **Dashboard > Chaves de API** e copie seu token
3. Configure a variável de ambiente:

**No Mac/Linux:**
```bash
export BRAPI_TOKEN="seu-token-aqui"
```

**No Windows (PowerShell):**
```powershell
$env:BRAPI_TOKEN="seu-token-aqui"
```

> O plano gratuito da brapi.dev permite 15.000 requisições/mês — mais que
> suficiente para atualizar ~50 ações a cada 5 minutos o dia inteiro.

## 4. Rodar o app

```bash
python servidor.py
```

Abra o navegador em **http://localhost:5000**

O servidor:
- Busca todas as cotações reais ao iniciar
- Atualiza automaticamente a cada 5 minutos (configurável)
- Serve o app completo com setores, alertas e cotações ao vivo

Para mudar o intervalo de atualização automática (em segundos):

```bash
INTERVALO_SEGUNDOS=600 python servidor.py   # atualiza a cada 10 min
```

## 5. Estrutura do projeto

```
b3_investimentos/
├── buscar_cotacoes.py   # Script que busca cotações na brapi.dev
├── servidor.py          # Servidor Flask local + atualização automática
├── static/
│   └── index.html       # Front-end (interface do app)
├── cotacoes.json         # Gerado automaticamente a cada busca
└── README.md
```

## 6. Setores oficiais da B3 incluídos

1. Petróleo, Gás e Biocombustíveis
2. Utilidade Pública
3. Materiais Básicos
4. Bens Industriais
5. Financeiro
6. Consumo Não Cíclico
7. Consumo Cíclico
8. Saúde
9. Comunicações
10. Tecnologia da Informação

Para adicionar ou remover empresas, edite o dicionário `SETORES` em
`buscar_cotacoes.py`.

