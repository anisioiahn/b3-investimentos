## 8. Solução de problemas

**Erro 401 (Unauthorized):** seu token não foi configurado corretamente.
Verifique se a variável `BRAPI_TOKEN` está definida no terminal **antes**
de rodar `python servidor.py`.

**Erro 402 (Payment Required):** você excedeu o limite de requisições do
seu plano. Aumente o `INTERVALO_SEGUNDOS` ou faça upgrade do plano na
brapi.dev.

**Tickers aparecem sem preço:** confira se o ticker está correto e ativo
na B3 — empresas que mudaram de nome/ticker (como Marfrig → MBRF3) podem
precisar de ajuste manual no dicionário `SETORES`.
