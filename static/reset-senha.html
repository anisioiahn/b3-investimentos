<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Janus B3 — Redefinir Senha</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#0a0e1a 0%,#0d1b3e 50%,#0a1628 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:2.5rem;width:100%;max-width:400px}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:2rem;justify-content:center}
.logo img{width:48px;height:48px;border-radius:12px}
.logo h1{font-size:20px;font-weight:700;color:#fff}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:12px;font-weight:600;color:rgba(255,255,255,.6);text-transform:uppercase}
.field input{padding:12px 14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;font-size:14px;outline:none}
.field input:focus{border-color:#0066cc}
.field input::placeholder{color:rgba(255,255,255,.3)}
.btn{padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;width:100%;background:linear-gradient(135deg,#0066cc,#0099ff);color:#fff;margin-top:6px}
.btn:hover{opacity:.9}
.erro{background:rgba(229,57,53,.15);border:1px solid rgba(229,57,53,.3);border-radius:8px;padding:10px;color:#ff6b6b;font-size:13px;display:none;margin-bottom:10px}
.sucesso{background:rgba(22,163,74,.15);border:1px solid rgba(22,163,74,.3);border-radius:8px;padding:10px;color:#4caf50;font-size:13px;display:none;margin-bottom:10px}
.titulo{text-align:center;margin-bottom:1.5rem}
.titulo .icon{font-size:40px;margin-bottom:10px}
.titulo h2{color:#fff;font-size:18px}
.titulo p{color:rgba(255,255,255,.5);font-size:13px;margin-top:4px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/icon-192.png" alt="Janus">
    <h1>Janus B3</h1>
  </div>
  <div class="titulo">
    <div class="icon">🔐</div>
    <h2>Redefinir senha</h2>
    <p>Digite sua nova senha abaixo</p>
  </div>
  <div class="erro" id="erro"></div>
  <div class="sucesso" id="suc"></div>
  <div id="form-reset">
    <div class="field">
      <label>Nova senha</label>
      <input type="password" id="nova-senha" placeholder="Mínimo 8 caracteres">
    </div>
    <div class="field">
      <label>Confirmar senha</label>
      <input type="password" id="conf-senha" placeholder="Repita a senha">
    </div>
    <button class="btn" onclick="resetar()">Redefinir senha</button>
  </div>
</div>
<script>
const token = new URLSearchParams(window.location.search).get('token');
if(!token){
  document.getElementById('erro').textContent='Link inválido.';
  document.getElementById('erro').style.display='block';
  document.getElementById('form-reset').style.display='none';
}
async function resetar(){
  const senha=document.getElementById('nova-senha').value;
  const conf=document.getElementById('conf-senha').value;
  document.getElementById('erro').style.display='none';
  if(senha.length<8){document.getElementById('erro').textContent='Mínimo 8 caracteres';document.getElementById('erro').style.display='block';return;}
  if(senha!==conf){document.getElementById('erro').textContent='Senhas não coincidem';document.getElementById('erro').style.display='block';return;}
  const r=await fetch('/api/auth/reset-senha',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,senha})});
  const d=await r.json();
  if(d.ok){
    document.getElementById('suc').textContent='✅ Senha redefinida! Redirecionando...';
    document.getElementById('suc').style.display='block';
    document.getElementById('form-reset').style.display='none';
    setTimeout(()=>window.location.href='/login',2000);
  } else {
    document.getElementById('erro').textContent=d.erro||'Link inválido ou expirado';
    document.getElementById('erro').style.display='block';
  }
}
</script>
</body>
</html>
